; =============================================================================
; PlatformIO — Banco de Pruebas HIL para Caudalímetro Difuso FPGA
;
; Board:     ESP32 XX5R69 (ESP-WROOM-32 compatible)
; Framework: Arduino
; =============================================================================

[env:esp32_hil]
platform = espressif32
board = esp32dev
framework = arduino

; --- Serial Monitor ---
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; --- Build flags ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -Wall
    -Wextra

; --- Upload ---
upload_speed = 921600
